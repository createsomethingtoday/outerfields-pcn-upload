name = "outerfields-pcn-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "9645bd52e640b8a4f40a3a55ff1dd75a"

# Production URL: https://outerfields.mcp.createsomething.agency
# Secondary: mcp.outerfields.io (configured via Cloudflare Dashboard)
[[routes]]
pattern = "outerfields.mcp.createsomething.agency"
custom_domain = true

# Shared telemetry (fleet observability)
[[d1_databases]]
binding = "TELEMETRY_DB"
database_name = "cs-telemetry"
database_id = "f710641a-0c85-4a7b-bb73-2c16f8d024c3"
